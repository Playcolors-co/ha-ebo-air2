name: EBO Air 2 (beta)
version: "0.16.0"
slug: ebo_air2
description: Control and telemetry for the Enabot EBO Air 2 in Home Assistant (via Enabot cloud)
url: https://github.com/Playcolors-co/ha-addons-beta
# Reverse-engineered, unofficial, undocumented cloud API: mark as experimental.
stage: experimental
# The Agora SDK is built for x86_64 (glibc) only. HAOS on Proxmox/NUC is amd64.
arch:
  - amd64
startup: application
boot: auto
# RTSP video (Generic Camera). 8554 = single robot / first robot; 8555-8557 = extra robots
# when the account has more than one (one RTSP port per robot).
ports:
  8554/tcp: 8554
  8555/tcp: 8555
  8556/tcp: 8556
  8557/tcp: 8557
ports_description:
  8554/tcp: "RTSP video (robot 1) — rtsp://<HA-IP>:8554/ebo"
  8555/tcp: "RTSP video (robot 2, if any)"
  8556/tcp: "RTSP video (robot 3, if any)"
  8557/tcp: "RTSP video (robot 4, if any)"
# Our base is python:3.11-slim (not an HA base image with s6): disable HA init.
init: false
# Request the Supervisor MQTT service: the broker credentials are provided automatically.
services:
  - mqtt:need
# Allow querying the Supervisor for the host IP (to show the exact RTSP camera URL).
hassio_api: true
# Options exposed in the add-on UI
options:
  email: ""
  password: ""
  region: "GB"
  host: "ebox-eu.enabotserverintl.com"
  robot_id: 0
  video: false
  audio: false
  video_encoded: false
  video_max_height: 720
  video_preset: "ultrafast"
  host_ip: ""
  log_level: "info"
schema:
  email: str
  password: password
  region: str
  host: str?
  robot_id: int?
  video: bool?
  audio: bool?
  video_encoded: bool?
  video_max_height: int?
  video_preset: list(ultrafast|superfast|veryfast|faster|fast)?
  host_ip: str?
  log_level: list(debug|info|warning)?
