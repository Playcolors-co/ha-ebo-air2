name: Enabot integration
version: "0.4.3"
slug: ebo_air2
description: Control and telemetry for the Enabot EBO Air 2 in Home Assistant (via Enabot cloud)
url: https://github.com/Playcolors-co/ha-addons
# Reverse-engineered, unofficial, undocumented cloud API: mark as experimental.
stage: experimental
# The Agora SDK is built for x86_64 (glibc) only. HAOS on Proxmox/NUC is amd64.
arch:
  - amd64
startup: application
boot: auto
# Our base is python:3.11-slim (not an HA base image with s6): disable HA init.
init: false
# Request the Supervisor MQTT service: the broker credentials are provided automatically.
services:
  - mqtt:need
# Options exposed in the add-on UI
options:
  email: ""
  password: ""
  region: "GB"
  host: "ebox-eu.enabotserverintl.com"
  robot_id: 0
  video: false
schema:
  email: str
  password: password
  region: str
  host: str?
  robot_id: int?
  video: bool?
